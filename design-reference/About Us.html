document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: #B96B4D; margin-bottom: 40px;\">About us<\u002Fdiv>\n\n    <div data-grid=\"\" style=\"display: grid; grid-template-columns: 1.04fr .96fr; gap: 56px; align-items: start;\">\n\n      <section>\n        <h2 data-reveal=\"\" data-lede=\"\" style=\"opacity: 0; transform: translateY(16px); transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1); font-family: 'Libre Baskerville', Georgia, serif; font-weight: 700; letter-spacing: -0.07em; font-size: clamp(30px, 3.4vw, 46px); line-height: 1.12; color: #181A1F; margin: 0 0 26px;\">If it's not a <em style=\"font-style: italic; color: #B96B4D;\">heck yeah<\u002Fem>, it's a no from us.<\u002Fh2>\n        <div data-copy=\"\" data-reveal=\"\" style=\"opacity: 0; transform: translateY(16px); transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1);\">\n          <p style=\"font-size: 19px; line-height: 1.55; color: #5E6269; margin: 0 0 18px; max-width: 44ch;\">We grew up in India surrounded by brilliant people, and it was only after moving to the UK that we realised how many of them get quietly passed over for no good reason.&nbsp;<\u002Fp>\n          <p style=\"font-size: 19px; line-height: 1.55; color: #5E6269; margin: 0 0 18px; max-width: 44ch;\">So we built Growthbuddy to find those people and match them with growing companies overseas, where they finally get the opportunities they deserve.<\u002Fp>\n          <p style=\"font-size: 19px; line-height: 1.55; color: #5E6269; margin: 0 0 18px; max-width: 44ch;\">For a single role we typically work through thousands of applicants (literally), narrowing slowly, turning most away, until one or two people stand out enough that we'd be proud to put forward. We won't lie – it requires a lot of patience and is emotionally draining, but we do it because we know it's someone's career and someone's company on the line<\u002Fp>\n          <p style=\"font-size: 19px; line-height: 1.55; color: #5E6269; margin: 0; max-width: 44ch;\">Eventually, when a match works out, it all feels worth the rigour and effort. We have a very simple rule, if we wouldn't happily hire someone ourselves, we would never put them forward to you.<\u002Fp>\n        <\u002Fdiv>\n        <p data-reveal=\"\" style=\"opacity: 0; transform: translateY(16px); transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1); font-family: 'Libre Baskerville', serif; font-style: italic; font-weight: 400; color: #B96B4D; font-size: 24px; letter-spacing: -0.07em; margin-top: 30px;\">Avani &amp; Sri<\u002Fp>\n      <\u002Fsection>\n\n      <aside>\n        <img data-reveal=\"\" src=\"9bb28581-ba18-438f-a737-177c001c9071\" alt=\"Growthbuddy founders Avani and Sri, smiling, with a city skyline behind them\" style=\"opacity: 0; transform: translateY(16px); transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1); width: 100%; aspect-ratio: 1/1; object-fit: cover; object-position: 50% 28%; border-radius: 20px; display: block; box-shadow: 0 1px 2px rgba(0,0,0,.05), 0 18px 40px rgba(0,0,0,.12);\">\n\n        <p data-reveal=\"\" style=\"opacity: 0; transform: translateY(16px); transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1); font-family: 'Space Grotesk', sans-serif; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; font-size: 14px; color: #B96B4D; margin: 34px 0 16px;\">Our approach<\u002Fp>\n\n        <div data-cards=\"\" data-reveal=\"\" style=\"opacity: 0; transform: translateY(16px); transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1); display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;\">\n\n          <button data-flip=\"\" aria-label=\"Value: Slow is fine. Wrong isn't. Click to flip for more.\" style=\"appearance: none; border: 0; background: transparent; padding: 0; margin: 0; width: 100%; height: 184px; font-family: inherit; cursor: pointer; perspecti u002Fsvg>\n                <\u002Fspan>\n                <span style=\"font-weight: 600; font-size: 16px; line-height: 1.32; color: #181A1F; letter-spacing: -0.01em;\">Care more than<br>is <span style=\"color: #B96B4D;\">sensible.<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n              <div data-face=\"\" style=\"position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: #ECE4D5; border-radius: 18px; padding: 16px 14px; box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 14px 30px rgba(0,0,0,.05); transition: box-shadow .4s cubic-bezier(.22,1,.36,1);\">\n                <p style=\"margin: 0; font-size: 14px; line-height: 1.5; color: #5E6269;\">If we don't feel it personally, we shouldn't be doing this.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fbutton>\n\n          <button data-flip=\"\" aria-label=\"Value: Reputation over revenue. Click to flip for more.\" style=\"appearance: none; border: 0; background: transparent; padding: 0; margin: 0; width: 100%; height: 184px; font-family: inherit; cursor: pointer; perspective: 1200px; text-align: center;\" style-focus=\"outline: 2px solid #B96B4D; outline-offset: 3px; border-radius: 20px;\">\n            <div data-flip-inner=\"\" style=\"position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform .65s cubic-bezier(.22,1,.36,1);\">\n              <div data-face=\"\" style=\"position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: #ECE4D5; border-radius: 18px; padding: 16px 14px; box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 14px 30px rgba(0,0,0,.05); transition: box-shadow .4s cubic-bezier(.22,1,.36,1);\">\n                <span data-vig=\"medal\" style=\"width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;\">\n                  <svg viewBox=\"0 0 48 48\" aria-hidden=\"true\" style=\"width: 30px; height: 30px; overflow: visible; display: block;\">\n                    <g class=\"medal\" style=\"transform-box: fill-box; transform-origin: center;\">\n                      <path d=\"M20 31 L15 45 L21 41.5 Z\" fill=\"#B96B4D\"><\u002Fpath>\n                      <path d=\"M28 31 L33 45 L27 41.5 Z\" fill=\"#B96B4D\"><\u002Fpath>\n                      <circle cx=\"24\" cy=\"20\" r=\"13\" fill=\"rgba(185,107,77,.10)\" stroke=\"#B96B4D\" stroke-width=\"2.5\"><\u002Fcircle>\n                      <circle cx=\"24\" cy=\"20\" r=\"9\" fill=\"none\" stroke=\"#B96B4D\" stroke-width=\"1.1\" opacity=\"0.45\"><\u002Fcircle>\n                      <path class=\"star\" d=\"M24 13.8 L25.59 17.82 L29.9 18.08 L26.57 20.83 L27.64 25.02 L24 22.7 L20.36 25.02 L21.43 20.83 L18.1 18.08 L22.41 17.82 Z\" fill=\"#B96B4D\" style=\"transform-box: fill-box; transform-origin: 24px 20px;\"><\u002Fpath>\n                    <\u002Fg>\n                  <\u002Fsvg>\n                <\u002Fspan>\n                <span style=\"font-weight: 600; font-size: 16px; line-height: 1.32; color: #181A1F; letter-spacing: -0.01em;\">Reputation over<br><span style=\"color: #B96B4D;\">revenue.<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n              <div data-face=\"\" style=\"position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: #ECE4D5; border-radius: 18px; padding: 16px 14px; box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 14px 30px rgba(0,0,0,.05); transition: box-shadow .4s cubic-bezier(.22,1,.36,1);\">\n                <p style=\"margin: 0; font-size: 14px; line-height: 1.5; color: #5E6269;\">We'll walk away from money before we put our name on the wrong person.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fbutton>\n\n        <\u002Fdiv>\n      <\u002Faside>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{ &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 920 } }\">\nclass Component extends DCLogic {\n  rootRef = React.createRef();\n  reduced = (typeof window !== 'undefined') && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n  play(vig) {\n    if (this.reduced || !vig) return;\n    vig.classList.remove('play');\n    void vig.getBoundingClientRect();\n    vig.classList.add('play');\n  }\n\n  componentDidMount() {\n    const root = this.rootRef.current;\n    if (!root) return;\n    this._handlers = [];\n\n    // Flip cards\n    const flips = Array.from(root.querySelectorAll('[data-flip]'));\n    flips.forEach((btn) => {\n      const inner = btn.querySelector('[data-flip-inner]');\n      const vig = btn.querySelector('[data-vig]');\n      const onClick = () => {\n        const next = btn.dataset.flipped !== 'true';\n        btn.dataset.flipped = next ? 'true' : 'false';\n        btn.setAttribute('aria-pressed', next ? 'true' : 'false');\n        inner.style.transform = next ? 'rotateY(180deg)' : 'rotateY(0deg)';\n        if (!next) this.play(vig);\n      };\n      const onEnter = () => { if (btn.dataset.flipped !== 'true') this.play(vig); };\n      btn.addEventListener('click', onClick);\n      btn.addEventListener('mouseenter', onEnter);\n      this._handlers.push([btn, 'click', onClick], [btn, 'mouseenter', onEnter]);\n    });\n\n    // Reveal on scroll\n    const reveals = Array.from(root.querySelectorAll('[data-reveal]'));\n    if (this.reduced) {\n      reveals.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; });\n    } else if ('IntersectionObserver' in window) {\n      this._revealIO = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            const el = e.target;\n            const i = reveals.indexOf(el);\n            el.style.transitionDelay = (Math.max(0, i) * 0.08) + 's';\n            el.style.opacity = '1';\n            el.style.transform = 'none';\n            this._revealIO.unobserve(el);\n          }\n        });\n      }, { threshold: 0.18 });\n      reveals.forEach((el) => this._revealIO.observe(el));\n    } else {\n      reveals.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; });\n    }\n\n    // Vignette draw-in\n    const vigs = Array.from(root.querySelectorAll('[data-vig]'));\n    if (this.reduced) return;\n    if ('IntersectionObserver' in window) {\n      this._vigIO = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            const v = e.target;\n            const i = +v.dataset.i || 0;\n            setTimeout(() => this.play(v), i * 180);\n            this._vigIO.unobserve(v);\n          }\n        });\n      }, { threshold: 0.4 });\n      vigs.forEach((v, i) => { v.dataset.i = i; this._vigIO.observe(v); });\n    } else {\n      vigs.forEach((v) => this.play(v));\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._revealIO) this._revealIO.disconnect();\n    if (this._vigIO) this._vigIO.disconnect();\n    if (this._handlers) this._handlers.forEach(([el, ev, fn]) => el.removeEventListener(ev, fn));\n  }\n\n  renderVals() {\n    return { rootRef: this.rootRef };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
